  <rect width="512" height="512" rx="96" fill="#18181b"/>
  <!-- TV body -->
  <rect x="80" y="188" width="352" height="236" rx="24" fill="none" stroke="#10b981" stroke-width="30" stroke-linejoin="round"/>
  <!-- Left antenna -->
